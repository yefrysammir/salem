<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Prevent pinch/zoom on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <!-- App iOS -->
  <meta name="theme-color" content="#000" />
  <meta name="apple-mobile-web-app-title" content="STV" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-orientation" content="landscape">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />
  <title>STV</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" href="https://iili.io/FbnBO4j.png">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</head>
<body oncontextmenu="return false;">
  <!-- sticky tabs: EnVi first (default), Imágenes second -->
  <div class="tabs" id="tabs">
    <div class="tabs-inner">
      <div class="tab active" data-tab="tv"><span class="material-symbols-outlined" aria-hidden="true">sports_soccer</span><p>TV ONE</p></div>
<div class="tab" data-tab="tv2"><span class="material-symbols-outlined" aria-hidden="true">sports_soccer</span><p>TV TWO</p></div>
<div class="tab" data-tab="tv3"><span class="material-symbols-outlined" aria-hidden="true">public</span><p>LATAM</p></div>
      <div class="tab" data-tab="movies"><span class="material-symbols-outlined" aria-hidden="true">movie</span><p>MOVIES</p></div>
    </div>
  </div>

  <main id="main">
    <!-- contenido dinámico -->
  </main>
  <!-- Modal fullscreen para videos asociados a imagenes -->
<div id="modalFull" class="modal-full" aria-hidden="true">
  <div class="modal-inner" id="modalInner">
    <div class="modal-header">
      <button class="modal-close" id="modalClose" title="Cerrar">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
      </button>
      <div id="modalTitle" class="modal-title cp-info"></div>
    </div>
    <div class="modal-media" id="modalMedia"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
